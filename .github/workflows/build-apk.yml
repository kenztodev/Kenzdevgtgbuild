name: 🐦 Build Flutter APK & Kirim ke User

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: '📱 Nama Aplikasi'
        required: true
        default: 'MyFlutterApp'
      chat_id:
        description: '📤 ID Chat User Tujuan'
        required: true
        default: '123456789'

jobs:
  build:
    name: 🔨 Build Flutter APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ══════════════════════════════════════════════
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # ══════════════════════════════════════════════
      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ══════════════════════════════════════════════
      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      # ══════════════════════════════════════════════
      - name: 🐦 Setup Flutter (WAJIB!)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.4'
          channel: 'stable'
          cache: true

      # ══════════════════════════════════════════════
      - name: 🐦 Verifikasi Flutter
        run: flutter --version

      # ══════════════════════════════════════════════
      - name: 📦 Download & Setup Project Flutter
        run: |
          # Buat project Flutter baru
          flutter create --org com.user.app --project-name my_app flutter_project
          cd flutter_project
          
          # Install dependencies
          flutter pub get
          
          # Bisa juga clone project dari repository kakak
          # git clone https://github.com/username/project-flutter-kakak.git .
          
          cd ..

      # ══════════════════════════════════════════════
      - name: 🏗️ Build APK Release
        run: |
          cd flutter_project
          flutter build apk --release
          cd ..

      # ══════════════════════════════════════════════
      - name: 🔍 Locate & Rename APK
        id: apk
        run: |
          APK_NAME="${{ github.event.inputs.app_name }}-$(date +%Y%m%d-%H%M%S).apk"
          APK_NAME_CLEAN="${APK_NAME// /_}"
          
          # Cari APK hasil build Flutter
          if [ -f "flutter_project/build/app/outputs/flutter-apk/app-release.apk" ]; then
            cp "flutter_project/build/app/outputs/flutter-apk/app-release.apk" "$APK_NAME_CLEAN"
          elif [ -f "flutter_project/build/app/outputs/flutter-apk/app-debug.apk" ]; then
            cp "flutter_project/build/app/outputs/flutter-apk/app-debug.apk" "$APK_NAME_CLEAN"
          else
            echo "❌ APK tidak ditemukan!"
            find . -name "*.apk"
            exit 1
          fi
          
          echo "name=$APK_NAME_CLEAN" >> $GITHUB_OUTPUT
          echo "path=$APK_NAME_CLEAN" >> $GITHUB_OUTPUT
          echo "✅ APK siap: $APK_NAME_CLEAN"

      # ══════════════════════════════════════════════
      - name: 📤 Upload APK ke Artifact (cadangan)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.name }}
          path: ${{ steps.apk.outputs.path }}
          retention-days: 7

      # ══════════════════════════════════════════════
      - name: 📤 Kirim APK ke Telegram User
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          CHAT_ID="${{ github.event.inputs.chat_id }}"
          APK_PATH="${{ steps.apk.outputs.path }}"
          APP_NAME="${{ github.event.inputs.app_name }}"
          
          # Kirim pesan info dulu
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "text=✅ *Build APK Selesai!*%0A%0A📱 *Nama:* ${APP_NAME}%0A🔧 *Build:* Release%0A📦 *Platform:* Flutter%0A%0A⬇️ *Download APK di bawah ini:*" \
            -d "parse_mode=Markdown"
          
          # Kirim file APK
          curl -s -F "chat_id=${CHAT_ID}" \
            -F "document=@${APK_PATH}" \
            -F "caption=📱 *${APP_NAME}.apk*%0A✅ *Build sukses oleh Web2APK Bot*" \
            -F "parse_mode=Markdown" \
            "https://api.telegram.org/bot${BOT_TOKEN}/sendDocument"
          
          echo "✅ APK terkirim ke Telegram!"

      # ══════════════════════════════════════════════
      - name: 🎉 Selesai
        run: |
          echo "╔════════════════════════════════════════════╗"
          echo "║  ✅ BUILD APK SELESAI!                      ║"
          echo "║  📱 APK sudah dikirim ke user               ║"
          echo "╚════════════════════════════════════════════╝"