name: Build Flutter APK

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'Nama Aplikasi'
        required: true
        default: 'MyApp'
      build_type:
        description: 'Tipe build (debug/release)'
        required: true
        default: 'debug'
      zip_type:
        description: 'Jenis project (flutter/android/webview)'
        required: true
        default: 'flutter'
      chat_id:
        description: 'Telegram Chat ID untuk kirim hasil'
        required: true
      user_id:
        description: 'Telegram User ID'
        required: true
      zip_b64:
        description: 'File ZIP dalam base64'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. SETUP ──────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔔 Notif Telegram — Build Dimulai
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d '{
              "chat_id": "${{ github.event.inputs.chat_id }}",
              "text": "⚙️ *Build dimulai!*\n\n📱 App: *${{ github.event.inputs.app_name }}*\n🛠️ Type: *${{ github.event.inputs.build_type }}*\n\n_GitHub Actions runner siap..._",
              "parse_mode": "Markdown"
            }'

      # ── 2. DECODE ZIP ─────────────────────────────────────
      - name: 📦 Decode ZIP dari base64
        if: ${{ github.event.inputs.zip_b64 != '' && github.event.inputs.zip_type != 'webview' }}
        run: |
          echo "${{ github.event.inputs.zip_b64 }}" | base64 -d > project.zip
          mkdir -p flutter_project
          unzip -q project.zip -d flutter_project
          echo "✅ ZIP berhasil di-decode"
          ls flutter_project/

      # ── 3A. FLUTTER BUILD ─────────────────────────────────
      - name: ☕ Setup Java (untuk Flutter/Android)
        if: ${{ github.event.inputs.zip_type == 'flutter' || github.event.inputs.zip_type == 'android' }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🐦 Setup Flutter
        if: ${{ github.event.inputs.zip_type == 'flutter' }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: 📦 Flutter pub get
        if: ${{ github.event.inputs.zip_type == 'flutter' }}
        working-directory: flutter_project
        run: |
          # Cari pubspec.yaml secara rekursif
          PUBSPEC=$(find . -name "pubspec.yaml" -maxdepth 3 | head -1)
          if [ -z "$PUBSPEC" ]; then
            echo "❌ pubspec.yaml tidak ditemukan!"
            exit 1
          fi
          PROJECT_DIR=$(dirname "$PUBSPEC")
          echo "Project dir: $PROJECT_DIR"
          cd "$PROJECT_DIR"
          flutter pub get
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV

      - name: 🔔 Notif — Kompilasi Flutter
        if: ${{ github.event.inputs.zip_type == 'flutter' }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d '{
              "chat_id": "${{ github.event.inputs.chat_id }}",
              "text": "⚙️ Mengompilasi Flutter...\n`▰▰▰▰▰▱▱▱▱▱` *50%*",
              "parse_mode": "Markdown"
            }'

      - name: 🔨 Flutter Build APK (Debug)
        if: ${{ github.event.inputs.zip_type == 'flutter' && github.event.inputs.build_type == 'debug' }}
        working-directory: flutter_project/${{ env.PROJECT_DIR }}
        run: flutter build apk --debug --no-pub

      - name: 🔨 Flutter Build APK (Release)
        if: ${{ github.event.inputs.zip_type == 'flutter' && github.event.inputs.build_type == 'release' }}
        working-directory: flutter_project/${{ env.PROJECT_DIR }}
        run: |
          flutter build apk --release --no-pub \
            --dart-define=APP_NAME="${{ github.event.inputs.app_name }}"

      # ── 3B. ANDROID STUDIO / GRADLE BUILD ─────────────────
      - name: 🔨 Gradle Build (Android Studio)
        if: ${{ github.event.inputs.zip_type == 'android' }}
        working-directory: flutter_project
        run: |
          GRADLE_FILE=$(find . -name "gradlew" -maxdepth 3 | head -1)
          if [ -z "$GRADLE_FILE" ]; then echo "❌ gradlew tidak ditemukan!"; exit 1; fi
          PROJECT_DIR=$(dirname "$GRADLE_FILE")
          cd "$PROJECT_DIR"
          chmod +x gradlew
          if [ "${{ github.event.inputs.build_type }}" == "release" ]; then
            ./gradlew assembleRelease
          else
            ./gradlew assembleDebug
          fi

      # ── 3C. WEBVIEW APK ───────────────────────────────────
      - name: 🌐 Build WebView APK dari URL
        if: ${{ github.event.inputs.zip_type == 'webview' }}
        run: |
          echo "WebView APK build (template-based)"
          # Di sini bisa pakai template Flutter WebView
          # atau gunakan WebAPK builder lainnya

      # ── 4. TEMUKAN APK ────────────────────────────────────
      - name: 🔍 Temukan file APK
        id: find_apk
        run: |
          APK_PATH=$(find . -name "*.apk" -not -path "*/intermediates/*" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "❌ APK tidak ditemukan!"
            echo "apk_found=false" >> $GITHUB_OUTPUT
          else
            echo "✅ APK ditemukan: $APK_PATH"
            APK_SIZE=$(du -sh "$APK_PATH" | cut -f1)
            echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
            echo "apk_size=$APK_SIZE" >> $GITHUB_OUTPUT
            echo "apk_found=true" >> $GITHUB_OUTPUT
          fi

      # ── 5. UPLOAD ARTIFACT ────────────────────────────────
      - name: 📤 Upload APK sebagai artifact
        if: steps.find_apk.outputs.apk_found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: APK-${{ github.event.inputs.app_name }}-${{ github.event.inputs.build_type }}
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 7

      # ── 6. KIRIM APK KE TELEGRAM ──────────────────────────
      - name: 📨 Kirim APK ke Telegram
        if: steps.find_apk.outputs.apk_found == 'true'
        run: |
          APK_NAME="${{ github.event.inputs.app_name }}_${{ github.event.inputs.build_type }}.apk"
          cp "${{ steps.find_apk.outputs.apk_path }}" "$APK_NAME"
          
          # Kirim file APK langsung ke Telegram
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendDocument" \
            -F "chat_id=${{ github.event.inputs.chat_id }}" \
            -F "document=@$APK_NAME" \
            -F "caption=✅ *BUILD BERHASIL!*

📱 App: *${{ github.event.inputs.app_name }}*
⚙️ Type: *${{ github.event.inputs.build_type }}*
📦 Ukuran: *${{ steps.find_apk.outputs.apk_size }}*
🏗️ Build by: KENZ'Z AI V3.0

_Install APK di atas! (aktifkan izin sumber tidak dikenal)_" \
            -F "parse_mode=Markdown"

      # ── 7. NOTIF SUKSES ───────────────────────────────────
      - name: 🔔 Notif Telegram — Build Selesai
        if: steps.find_apk.outputs.apk_found == 'true'
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{
              \"chat_id\": \"${{ github.event.inputs.chat_id }}\",
              \"text\": \"✅ *Build selesai!* APK dikirim di atas ⬆️\n\n\`▰▰▰▰▰▰▰▰▰▰\` *100%* ✅\n\nKetuk /start untuk build lagi.\",
              \"parse_mode\": \"Markdown\",
              \"reply_markup\": {
                \"inline_keyboard\": [
                  [{\"text\": \"🔄 Build Lagi\", \"callback_data\": \"menu_create_zip\"}],
                  [{\"text\": \"🏠 Menu Utama\", \"callback_data\": \"menu_main\"}]
                ]
              }
            }"

      # ── 8. NOTIF GAGAL ────────────────────────────────────
      - name: 🔔 Notif Telegram — Build Gagal
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{
              \"chat_id\": \"${{ github.event.inputs.chat_id }}\",
              \"text\": \"❌ *BUILD GAGAL!*\n\n📱 App: *${{ github.event.inputs.app_name }}*\n\nCek log error:\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
              \"parse_mode\": \"Markdown\",
              \"reply_markup\": {
                \"inline_keyboard\": [
                  [{\"text\": \"📋 Lihat Log Error\", \"url\": \"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}],
                  [{\"text\": \"🔄 Coba Lagi\", \"callback_data\": \"menu_create_zip\"}]
                ]
              }
            }"
