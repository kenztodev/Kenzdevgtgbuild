name: Build APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Type: url or zip'
        required: true
        default: 'url'
      project_type:
        description: 'Project: flutter or android'
        required: true
        default: 'flutter'
      app_url:
        description: 'Website URL (for URL builds)'
        required: false
      app_name:
        description: 'App name'
        required: true
        default: 'MyApp'
      build_mode:
        description: 'Build mode: debug or release'
        required: true
        default: 'release'
      user_id:
        description: 'Telegram user ID'
        required: true
      chat_id:
        description: 'Telegram chat ID'
        required: true
      icon_url:
        description: 'Icon URL (optional)'
        required: false

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ─── Setup ─────────────────────────────────────────────────────────────────
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🐦 Setup Flutter
        if: ${{ inputs.project_type == 'flutter' }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      # ─── Notify: Build Started ─────────────────────────────────────────────────
      - name: 📢 Notify Build Started
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d '{
              "chat_id": "${{ inputs.chat_id }}",
              "text": "🔨 *Build dimulai!*\n\n📱 App: `${{ inputs.app_name }}`\n🏗️ GitHub Actions Runner aktif...\n\n⏳ Estimasi: 2-5 menit",
              "parse_mode": "Markdown"
            }' || true

      # ─── URL-based APK Build ───────────────────────────────────────────────────
      - name: 🌐 Setup URL-based Flutter Project
        if: ${{ inputs.build_type == 'url' }}
        run: |
          echo "📦 Creating Flutter WebView project for: ${{ inputs.app_url }}"
          
          flutter create --project-name app_build --org com.web2apk app_build
          cd app_build
          
          # Add webview dependency
          flutter pub add webview_flutter
          
          # Replace main.dart with WebView app
          cat > lib/main.dart << 'DART'
          import 'package:flutter/material.dart';
          import 'package:webview_flutter/webview_flutter.dart';
          
          void main() {
            WidgetsFlutterBinding.ensureInitialized();
            runApp(const MyApp());
          }
          
          class MyApp extends StatelessWidget {
            const MyApp({super.key});
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: 'APP_NAME_PLACEHOLDER',
                debugShowCheckedModeBanner: false,
                home: const WebViewScreen(),
              );
            }
          }
          
          class WebViewScreen extends StatefulWidget {
            const WebViewScreen({super.key});
            @override
            State<WebViewScreen> createState() => _WebViewScreenState();
          }
          
          class _WebViewScreenState extends State<WebViewScreen> {
            late final WebViewController _controller;
          
            @override
            void initState() {
              super.initState();
              _controller = WebViewController()
                ..setJavaScriptMode(JavaScriptMode.unrestricted)
                ..setNavigationDelegate(NavigationDelegate(
                  onPageFinished: (url) {},
                ))
                ..loadRequest(Uri.parse('APP_URL_PLACEHOLDER'));
            }
          
            @override
            Widget build(BuildContext context) {
              return Scaffold(
                body: SafeArea(child: WebViewWidget(controller: _controller)),
              );
            }
          }
          DART
          
          # Replace placeholders
          APP_NAME="${{ inputs.app_name }}"
          APP_URL="${{ inputs.app_url }}"
          sed -i "s|APP_NAME_PLACEHOLDER|${APP_NAME}|g" lib/main.dart
          sed -i "s|APP_URL_PLACEHOLDER|${APP_URL}|g" lib/main.dart
          
          # Update app name in pubspec.yaml
          sed -i "s|^name: .*|name: app_build|" pubspec.yaml
          
          # Update AndroidManifest for internet permission + app name
          sed -i 's|android:label="[^"]*"|android:label="${{ inputs.app_name }}"|' android/app/src/main/AndroidManifest.xml
          
          # Add internet permission
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.INTERNET"/>' android/app/src/main/AndroidManifest.xml

      # ─── Custom Icon Setup ─────────────────────────────────────────────────────
      - name: 🖼️ Setup Custom Icon
        if: ${{ inputs.icon_url != '' && inputs.build_type == 'url' }}
        working-directory: app_build
        run: |
          sudo apt-get install -y imagemagick
          wget -q "${{ inputs.icon_url }}" -O custom_icon.png || true
          
          if [ -f custom_icon.png ]; then
            flutter pub add flutter_launcher_icons
            cat >> pubspec.yaml << 'YAML'
          
          flutter_launcher_icons:
            android: true
            ios: false
            image_path: "custom_icon.png"
          YAML
            flutter pub run flutter_launcher_icons || true
          fi

      # ─── Build Flutter APK ─────────────────────────────────────────────────────
      - name: 🏗️ Build Flutter APK (URL Project)
        if: ${{ inputs.build_type == 'url' && inputs.project_type == 'flutter' }}
        working-directory: app_build
        run: |
          flutter pub get
          if [ "${{ inputs.build_mode }}" = "debug" ]; then
            flutter build apk --debug
          else
            flutter build apk --release
          fi

      - name: 🏗️ Build Flutter APK (ZIP Project)
        if: ${{ inputs.build_type == 'zip' && inputs.project_type == 'flutter' }}
        run: |
          # ZIP handling: download and extract
          # In real use, zip is uploaded to temp storage and URL passed
          echo "⚠️ ZIP build requires zip file to be pre-uploaded to storage"
          ls -la || true
          
          if [ -d "flutter_project" ]; then
            cd flutter_project
            flutter pub get
            if [ "${{ inputs.build_mode }}" = "debug" ]; then
              flutter build apk --debug
            else
              flutter build apk --release
            fi
          fi

      - name: 🏗️ Build Android Studio APK (ZIP Project)
        if: ${{ inputs.build_type == 'zip' && inputs.project_type == 'android' }}
        run: |
          if [ -d "android_project" ]; then
            cd android_project
            chmod +x gradlew
            if [ "${{ inputs.build_mode }}" = "debug" ]; then
              ./gradlew assembleDebug
            else
              ./gradlew assembleRelease
            fi
          fi

      # ─── Find & Rename APK ────────────────────────────────────────────────────
      - name: 📦 Locate & Rename APK
        id: apk
        run: |
          APP_NAME="${{ inputs.app_name }}"
          BUILD_MODE="${{ inputs.build_mode }}"
          SAFE_NAME=$(echo "$APP_NAME" | tr ' ' '_' | tr -cd '[:alnum:]_-')
          APK_FILENAME="${SAFE_NAME}_${BUILD_MODE}.apk"
          
          # Search for APK in common output locations
          APK_PATH=$(find . -name "*.apk" -not -path "*/intermediates/*" 2>/dev/null | head -1)
          
          if [ -z "$APK_PATH" ]; then
            echo "❌ APK not found!"
            echo "found=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          echo "✅ Found APK: $APK_PATH"
          cp "$APK_PATH" "./${APK_FILENAME}"
          APK_SIZE=$(du -sh "${APK_FILENAME}" | cut -f1)
          
          echo "apk_path=${APK_FILENAME}" >> $GITHUB_OUTPUT
          echo "apk_name=${APK_FILENAME}" >> $GITHUB_OUTPUT
          echo "apk_size=${APK_SIZE}" >> $GITHUB_OUTPUT
          echo "found=true" >> $GITHUB_OUTPUT

      # ─── Upload APK as Artifact ────────────────────────────────────────────────
      - name: ☁️ Upload APK Artifact
        if: steps.apk.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.app_name }}-apk
          path: ${{ steps.apk.outputs.apk_path }}
          retention-days: 7

      # ─── Send APK to Telegram ─────────────────────────────────────────────────
      - name: 📤 Send APK to Telegram
        if: steps.apk.outputs.found == 'true'
        run: |
          APK_FILE="${{ steps.apk.outputs.apk_path }}"
          APK_SIZE="${{ steps.apk.outputs.apk_size }}"
          APP_NAME="${{ inputs.app_name }}"
          BUILD_MODE="${{ inputs.build_mode }}"
          CHAT_ID="${{ inputs.chat_id }}"
          
          # Get artifact download URL
          RUN_ID="${{ github.run_id }}"
          REPO="${{ github.repository }}"
          ARTIFACT_URL="https://github.com/${REPO}/actions/runs/${RUN_ID}"
          
          # Send APK file via Telegram
          CAPTION="✅ *APK Build Success*

📱 App: \`${APP_NAME}\`
🔨 Type: Flutter
🎁 Build: ${BUILD_MODE}
📦 Size: ${APK_SIZE}

_Generated by Web2APK Bot_"
          
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendDocument" \
            -F "chat_id=${CHAT_ID}" \
            -F "document=@${APK_FILE}" \
            -F "caption=${CAPTION}" \
            -F "parse_mode=Markdown" || true

      # ─── Notify Bot Server: Build Result ──────────────────────────────────────
      - name: 🔔 Notify Bot Server
        if: always()
        run: |
          STATUS="success"
          ERROR_MSG=""
          APK_SIZE="${{ steps.apk.outputs.apk_size }}"
          
          if [ "${{ steps.apk.outputs.found }}" != "true" ] || [ "${{ job.status }}" = "failure" ]; then
            STATUS="failed"
            ERROR_MSG="Build gagal. Cek log GitHub Actions untuk detail."
          fi
          
          # Notify bot server (Pterodactyl) via webhook
          BOT_WEBHOOK_URL="${{ secrets.BOT_WEBHOOK_URL }}"
          WEBHOOK_SECRET="${{ secrets.WEBHOOK_SECRET }}"
          
          if [ -n "$BOT_WEBHOOK_URL" ]; then
            curl -s -X POST "${BOT_WEBHOOK_URL}/build-result" \
              -H "Content-Type: application/json" \
              -d "{
                \"secret\": \"${WEBHOOK_SECRET}\",
                \"userId\": \"${{ inputs.user_id }}\",
                \"chatId\": \"${{ inputs.chat_id }}\",
                \"appName\": \"${{ inputs.app_name }}\",
                \"status\": \"${STATUS}\",
                \"fileSize\": \"${APK_SIZE}\",
                \"buildTime\": \"${{ github.run_id }}\",
                \"error\": \"${ERROR_MSG}\"
              }" || true
          fi

      # ─── Notify Telegram: Build Failed ────────────────────────────────────────
      - name: ❌ Notify Build Failed
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d '{
              "chat_id": "${{ inputs.chat_id }}",
              "text": "❌ *Build Gagal!*\n\n📱 App: `${{ inputs.app_name }}`\n\nSilakan cek log atau coba lagi.\n\n🔗 [Lihat Log](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})",
              "parse_mode": "Markdown"
            }' || true
