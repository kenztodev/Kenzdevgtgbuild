name: 🌸 Web2APK Pro — Build APK

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'Build ID unik'
        required: true
        type: string
      app_name:
        description: 'Nama aplikasi'
        required: false
        default: 'MyApp'
        type: string
      project_type:
        description: 'Tipe project'
        required: false
        default: 'android'
        type: choice
        options: [flutter, android]
      build_type:
        description: 'Tipe build'
        required: false
        default: 'release'
        type: choice
        options: [debug, release]

jobs:
  build:
    name: 🔨 Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      BUILD_ID:     ${{ inputs.build_id || 'ci_test' }}
      APP_NAME:     ${{ inputs.app_name || 'MyApp' }}
      PROJECT_TYPE: ${{ inputs.project_type || 'android' }}
      BUILD_TYPE:   ${{ inputs.build_type || 'release' }}

    steps:

      # ══════════════════════════════════════════════
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # ══════════════════════════════════════════════
      - name: 🌸 Animasi — Build Start
        run: |
          echo ""
          echo "  ╔══════════════════════════════════════════════════╗"
          echo "  ║  ██╗    ██╗███████╗██████╗ ██████╗  █████╗ ██╗  ║"
          echo "  ║  ██║    ██║██╔════╝██╔══██╗╚════██╗██╔══██╗██║  ║"
          echo "  ║  ██║ █╗ ██║█████╗  ██████╔╝ █████╔╝███████║██║  ║"
          echo "  ║  ██║███╗██║██╔══╝  ██╔══██╗██╔═══╝ ██╔══██║██║  ║"
          echo "  ║  ╚███╔███╔╝███████╗██████╔╝███████╗██║  ██║██║  ║"
          echo "  ║   ╚══╝╚══╝ ╚══════╝╚═════╝ ╚══════╝╚═╝  ╚═╝╚═╝  ║"
          echo "  ╠══════════════════════════════════════════════════╣"
          echo "  ║  🌸 APK Pro Builder · GitHub Actions            ║"
          echo "  ╠══════════════════════════════════════════════════╣"
          echo "  ║  📱 App   : $APP_NAME"
          echo "  ║  🔧 Build : $BUILD_TYPE"
          echo "  ║  📦 Type  : $PROJECT_TYPE"
          echo "  ║  🆔 ID    : $BUILD_ID"
          echo "  ╚══════════════════════════════════════════════════╝"
          echo ""

      # ══════════════════════════════════════════════
      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: 🌸 [1/6] ░░░░░░░░░░░░░░░  10% — Java siap
        run: echo "  ▓▓░░░░░░░░░░░░░  10%  ☕ Java $(java -version 2>&1 | head -1 | cut -d'"' -f2) siap!"

      # ══════════════════════════════════════════════
      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 🌸 [2/6] ▓▓▓▓░░░░░░░░░░░  28% — Android SDK siap
        run: echo "  ▓▓▓▓░░░░░░░░░░░  28%  🤖 Android SDK tersedia!"

      # ══════════════════════════════════════════════
      - name: 📦 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # ══════════════════════════════════════════════
      - name: 🐦 Setup Flutter
        if: env.PROJECT_TYPE == 'flutter'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
          cache: true

      - name: 🐦 Flutter pub get
        if: env.PROJECT_TYPE == 'flutter'
        run: flutter pub get
        working-directory: web2apk-template

      - name: 🌸 [3/6] ▓▓▓▓▓▓▓░░░░░░░░  45% — Dependencies siap
        run: echo "  ▓▓▓▓▓▓▓░░░░░░░░  45%  📦 Dependencies berhasil diinstall!"

      # ══════════════════════════════════════════════
      - name: 🔑 chmod gradlew
        if: env.PROJECT_TYPE == 'android'
        run: chmod +x gradlew
        working-directory: web2apk-template/android

      - name: 🌸 [4/6] ▓▓▓▓▓▓▓▓▓░░░░░░  60% — Kompilasi dimulai...
        run: echo "  ▓▓▓▓▓▓▓▓▓░░░░░░  60%  ⚡ Kompilasi source code..."

      # ══════════════════════════════════════════════
      - name: 🏗️ Build Android APK
        if: env.PROJECT_TYPE == 'android'
        run: |
          if [ "$BUILD_TYPE" = "debug" ]; then
            ./gradlew assembleDebug --no-daemon --stacktrace
          else
            ./gradlew assembleRelease --no-daemon --stacktrace
          fi
        working-directory: web2apk-template/android

      - name: 🐦 Build Flutter APK
        if: env.PROJECT_TYPE == 'flutter'
        run: |
          if [ "$BUILD_TYPE" = "debug" ]; then
            flutter build apk --debug
          else
            flutter build apk --release --no-tree-shake-icons
          fi
        working-directory: web2apk-template

      - name: 🌸 [5/6] ▓▓▓▓▓▓▓▓▓▓▓▓░░░  85% — Packaging APK...
        run: echo "  ▓▓▓▓▓▓▓▓▓▓▓▓░░░  85%  📦 Packaging APK..."

      # ══════════════════════════════════════════════
      - name: 🔍 Locate & Rename APK
        id: apk
        run: |
          if [ "$PROJECT_TYPE" = "flutter" ]; then
            SRC=$(find web2apk-template/build/app/outputs/flutter-apk -name "*.apk" | head -1)
          else
            SRC=$(find web2apk-template/android/app/build/outputs/apk -name "*.apk" | head -1)
          fi
          DEST="app-${BUILD_TYPE}-${BUILD_ID}.apk"
          cp "$SRC" "$DEST"
          echo "file=$DEST" >> $GITHUB_OUTPUT
          echo "  APK: $DEST ($(du -sh $DEST | cut -f1))"

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ env.BUILD_ID }}
          path: ${{ steps.apk.outputs.file }}
          retention-days: 7
          if-no-files-found: error

      # ══════════════════════════════════════════════
      - name: 🌸 Animasi — Build Sukses!
        run: |
          echo ""
          echo "  ╔══════════════════════════════════════════════════╗"
          echo "  ║  ███████╗██╗   ██╗██╗  ██╗███████╗███████╗███╗  ║"
          echo "  ║  ██╔════╝██║   ██║██║ ██╔╝██╔════╝██╔════╝████╗ ║"
          echo "  ║  ███████╗██║   ██║█████╔╝ █████╗  ███████╗ ╚██║ ║"
          echo "  ║  ╚════██║██║   ██║██╔═██╗ ██╔══╝  ╚════██║  ██║ ║"
          echo "  ║  ███████║╚██████╔╝██║  ██╗███████╗███████║  ██║ ║"
          echo "  ║  ╚══════╝ ╚═════╝ ╚═╝  ╚═╝╚══════╝╚══════╝  ╚═╝ ║"
          echo "  ╠══════════════════════════════════════════════════╣"
          echo "  ║  ▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓  100%  ✅ SELESAI!           ║"
          echo "  ║                                                  ║"
          echo "  ║  📱 APK  : app-${BUILD_TYPE}-${BUILD_ID}.apk    ║"
          echo "  ║  🌸 App  : $APP_NAME                            ║"
          echo "  ║  ⬇️  Download: Actions → Artifacts              ║"
          echo "  ╚══════════════════════════════════════════════════╝"
          echo ""
          echo "  🌸 🌸 🌸  BUILD BERHASIL!  🌸 🌸 🌸"

      # ══════════════════════════════════════════════
      - name: 📢 Notify Telegram — Sukses
        if: always() && inputs.build_id != ''
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.ADMIN_CHAT_ID }}
          STATUS:    ${{ job.status }}
        run: |
          if [ -z "$BOT_TOKEN" ] || [ -z "$CHAT_ID" ]; then exit 0; fi
          if [ "$STATUS" = "success" ]; then
            MSG="✅ *Build Sukses!*%0A📱 App: *${APP_NAME}*%0A🆔 ID: \`${BUILD_ID}\`%0A%0A⬇️ APK siap didownload"
          else
            MSG="❌ *Build Gagal!*%0A📱 App: *${APP_NAME}*%0A🆔 ID: \`${BUILD_ID}\`%0A%0A🔗 Cek log: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}&text=${MSG}&parse_mode=Markdown" > /dev/null
