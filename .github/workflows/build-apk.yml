name: 🚀 FINAL BUILD APK - PASTI JALAN

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: '📱 Nama Aplikasi'
        required: true
        default: 'MyApp'
      chat_id:
        description: '📤 ID Chat User (wajib angka)'
        required: true
      project_type:
        description: '📦 Tipe Project'
        required: true
        default: 'webview'
        type: choice
        options:
          - webview
          - flutter
      url_website:
        description: '🌐 URL Website (untuk webview)'
        required: false
        default: 'https://example.com'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      # ========================================
      # 1. CHECKOUT & BANNER
      # ========================================
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Banner
        run: |
          echo "╔════════════════════════════════════════╗"
          echo "║  🌸 FINAL APK BUILDER v1.0             ║"
          echo "║  📱 ${{ github.event.inputs.app_name }}"
          echo "║  📦 ${{ github.event.inputs.project_type }}"
          echo "╚════════════════════════════════════════╝"
      
      # ========================================
      # 2. SETUP JAVA & ANDROID SDK
      # ========================================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      # ========================================
      # 3. INSTALL FLUTTER (MANUAL, PASTI OK)
      # ========================================
      - name: Install Flutter
        if: github.event.inputs.project_type == 'flutter'
        run: |
          git clone https://github.com/flutter/flutter.git --depth 1 -b stable
          echo "$(pwd)/flutter/bin" >> $GITHUB_PATH
          flutter precache
      
      - name: Verifikasi Flutter
        if: github.event.inputs.project_type == 'flutter'
        run: flutter doctor -v
      
      # ========================================
      # 4. BUAT PROJECT
      # ========================================
      
      # ----- UNTUK WEBVIEW (Android Native) -----
      - name: Buat WebView Project
        if: github.event.inputs.project_type == 'webview'
        run: |
          mkdir -p app/src/main/java/com/myapp/webview
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p gradle/wrapper
          
          # Download gradle wrapper
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.jar
          
          # settings.gradle
          cat > settings.gradle << 'EOF'
          rootProject.name = 'MyApp'
          include ':app'
          EOF
          
          # build.gradle (project)
          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.1.0' }
          }
          task clean(type: Delete) { delete rootProject.buildDir }
          EOF
          
          # build.gradle (app)
          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.myapp.webview'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.myapp.webview'
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
              buildTypes { release { minifyEnabled false } }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.webkit:webkit:1.9.0'
          }
          EOF
          
          # AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <application android:label="${{ github.event.inputs.app_name }}" android:usesCleartextTraffic="true">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          
          # MainActivity.java
          cat > app/src/main/java/com/myapp/webview/MainActivity.java << 'EOF'
          package com.myapp.webview;
          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import androidx.appcompat.app.AppCompatActivity;
          public class MainActivity extends AppCompatActivity {
              private WebView webView;
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  webView = findViewById(R.id.webView);
                  webView.setWebViewClient(new WebViewClient());
                  webView.getSettings().setJavaScriptEnabled(true);
                  webView.loadUrl("${{ github.event.inputs.url_website }}");
              }
              @Override
              public void onBackPressed() {
                  if (webView.canGoBack()) webView.goBack();
                  else super.onBackPressed();
              }
          }
          EOF
          
          # activity_main.xml
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <WebView xmlns:android="http://schemas.android.com/apk/res/android"
              android:id="@+id/webView"
              android:layout_width="match_parent"
              android:layout_height="match_parent" />
          EOF
          
          # gradle.properties
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          EOF
          
          echo "✅ WebView Project siap"
      
      # ----- UNTUK FLUTTER -----
      - name: Buat Flutter Project
        if: github.event.inputs.project_type == 'flutter'
        run: |
          flutter create --org com.user.app --project-name my_app flutter_project
          cd flutter_project
          flutter pub get
          cd ..
          echo "✅ Flutter Project siap"
      
      # ========================================
      # 5. BUILD APK
      # ========================================
      
      - name: Build WebView APK
        if: github.event.inputs.project_type == 'webview'
        run: |
          # Buat gradle wrapper
          cat > gradlew << 'EOF'
          #!/bin/bash
          exec java -cp gradle/wrapper/gradle-wrapper.jar org.gradle.wrapper.GradleWrapperMain "$@"
          EOF
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
      
      - name: Build Flutter APK
        if: github.event.inputs.project_type == 'flutter'
        run: |
          cd flutter_project
          flutter build apk --release
          cd ..
      
      # ========================================
      # 6. FIND & RENAME APK
      # ========================================
      - name: Find APK
        id: apk
        run: |
          APK_FILE=""
          if [ -f "app/build/outputs/apk/release/app-release.apk" ]; then
            APK_FILE="app/build/outputs/apk/release/app-release.apk"
          elif [ -f "flutter_project/build/app/outputs/flutter-apk/app-release.apk" ]; then
            APK_FILE="flutter_project/build/app/outputs/flutter-apk/app-release.apk"
          elif [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            APK_FILE="app/build/outputs/apk/debug/app-debug.apk"
          else
            echo "❌ APK tidak ditemukan!"
            find . -name "*.apk"
            exit 1
          fi
          
          NEW_NAME="${{ github.event.inputs.app_name }}-$(date +%Y%m%d-%H%M%S).apk"
          NEW_NAME_CLEAN="${NEW_NAME// /_}"
          cp "$APK_FILE" "$NEW_NAME_CLEAN"
          
          echo "path=$NEW_NAME_CLEAN" >> $GITHUB_OUTPUT
          echo "name=$NEW_NAME_CLEAN" >> $GITHUB_OUTPUT
          echo "✅ APK: $NEW_NAME_CLEAN"
      
      # ========================================
      # 7. UPLOAD ARTIFACT
      # ========================================
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.name }}
          path: ${{ steps.apk.outputs.path }}
          retention-days: 7
      
      # ========================================
      # 8. KIRIM KE TELEGRAM
      # ========================================
      - name: Kirim ke Telegram
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          # Kirim pesan teks
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${{ github.event.inputs.chat_id }}" \
            -d "text=✅ *${{ github.event.inputs.app_name }}*%0A🔧 Build: Release%0A📂 Size: $(du -sh ${{ steps.apk.outputs.path }} | cut -f1)%0A%0A⬇️ Download APK di bawah ini:" \
            -d "parse_mode=Markdown"
          
          # Kirim file APK
          curl -F "chat_id=${{ github.event.inputs.chat_id }}" \
               -F "document=@${{ steps.apk.outputs.path }}" \
               -F "caption=📱 *${{ github.event.inputs.app_name }}.apk* siap dipasang!" \
               -F "parse_mode=Markdown" \
               "https://api.telegram.org/bot${BOT_TOKEN}/sendDocument"
          
          echo "✅ APK terkirim!"
      
      # ========================================
      # 9. SELESAI
      # ========================================
      - name: Selesai
        run: |
          echo "╔════════════════════════════════════════╗"
          echo "║  ✅ BUILD SELESAI!                      ║"
          echo "║  📱 APK sudah dikirim ke Telegram       ║"
          echo "╚════════════════════════════════════════╝"