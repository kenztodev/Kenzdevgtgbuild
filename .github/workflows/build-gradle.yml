name: Build Gradle APK

on:
  workflow_dispatch:
    inputs:
      zip_path:
        description: 'Path ZIP di repo'
        required: true
      app_name:
        description: 'Nama aplikasi'
        required: true
        default: 'MyApp'
      build_type:
        description: 'debug atau release'
        required: true
        default: 'release'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Extract ZIP project
        run: |
          mkdir -p build_project
          unzip -q "${{ github.event.inputs.zip_path }}" -d build_project
          # Cari folder dengan build.gradle
          PROJ_DIR=$(find build_project -name "build.gradle" -maxdepth 4 | head -1 | xargs dirname)
          echo "PROJECT_DIR=$PROJ_DIR" >> $GITHUB_ENV

      - name: Grant execute permission for gradlew
        run: |
          cd "${{ env.PROJECT_DIR }}"
          chmod +x gradlew

      - name: Build APK with Gradle
        run: |
          cd "${{ env.PROJECT_DIR }}"
          BUILD_TYPE="${{ github.event.inputs.build_type }}"
          if [ "$BUILD_TYPE" = "debug" ]; then
            ./gradlew assembleDebug --no-daemon --stacktrace
            APK_PATH=$(find . -name "*debug*.apk" | head -1)
          else
            ./gradlew assembleRelease --no-daemon --stacktrace
            APK_PATH=$(find . -name "*release*.apk" | head -1)
          fi
          echo "APK_PATH=${{ env.PROJECT_DIR }}/${APK_PATH#./}" >> $GITHUB_ENV

      - name: Rename and upload APK
        run: |
          cp "${{ env.APK_PATH }}" "${{ github.event.inputs.app_name }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: APK-${{ github.event.inputs.app_name }}
          path: ${{ github.event.inputs.app_name }}.apk
          retention-days: 1
