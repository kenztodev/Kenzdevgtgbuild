name: Build APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        type: string
      website_url:
        description: 'Website URL'
        required: false
        type: string
      app_name:
        description: 'App name'
        required: false
        type: string
      build_mode:
        description: 'Build mode'
        required: true
        type: string
      project_type:
        description: 'Project type'
        required: false
        type: string
      zip_filename:
        description: 'ZIP filename'
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      
      - name: Build
        run: |
          echo "Build type: ${{ github.event.inputs.build_type }}"
          echo "URL: ${{ github.event.inputs.website_url }}"
          echo "App: ${{ github.event.inputs.app_name }}"
          echo "Mode: ${{ github.event.inputs.build_mode }}"
          
          # Create dummy APK file for testing
          mkdir -p output
          echo "PK" > output/test.apk
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ github.run_id }}
          path: output/*.apk
